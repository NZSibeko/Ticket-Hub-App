version: '3.8'

services:
  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tickethub-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - PORT=8081
      - DATABASE_URL=postgresql://tickethub:password@postgres:5432/tickethub
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_BUSINESS_ACCOUNT_ID=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - MESSENGER_PAGE_ID=${MESSENGER_PAGE_ID}
      - MESSENGER_ACCESS_TOKEN=${MESSENGER_ACCESS_TOKEN}
      - MESSENGER_VERIFY_TOKEN=${MESSENGER_VERIFY_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_TOKEN_SECRET=${TWITTER_ACCESS_TOKEN_SECRET}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - MAX_REQUESTS_PER_MINUTE=60
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - tickethub-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tickethub-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=tickethub
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tickethub_secure_password}
      - POSTGRES_DB=tickethub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - tickethub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickethub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tickethub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - tickethub-network
    depends_on:
      - backend

  # PM2 for Process Management (Optional - for production without Docker)
  # Uncomment if using PM2 instead of Docker in production
  # pm2:
  #   image: keymetrics/pm2:latest-alpine
  #   container_name: tickethub-pm2
  #   restart: unless-stopped
  #   volumes:
  #     - ./backend:/app
  #     - pm2_data:/root/.pm2
  #   environment:
  #     - NODE_ENV=production
  #   command: ["pm2-runtime", "dist/server.js"]
  #   networks:
  #     - tickethub-network

volumes:
  postgres_data:
    driver: local
  pm2_data:
    driver: local

networks:
  tickethub-network:
    driver: bridge
